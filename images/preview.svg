<svg xmlns="http://www.w3.org/2000/svg" width="280" height="620" viewBox="0 0 280 620">
  <!-- Remote body -->
  <rect x="20" y="10" width="240" height="600" rx="40" ry="44" fill="#242424"/>
  <rect x="21" y="11" width="238" height="1" rx="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Row 1: Power / Input / Mic -->
  <circle cx="75" cy="60" r="20" fill="#b71c1c"/>
  <path d="M75 47 v-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M67 50.5 a10.5 10.5 0 1 0 16 0" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>

  <rect x="112" y="41" width="48" height="38" rx="9" fill="#333"/>
  <path d="M130 55 h10 l-5 8z M128 63 h14" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <rect x="172" y="41" width="48" height="38" rx="9" fill="#333"/>
  <ellipse cx="196" cy="55" rx="5" ry="7" stroke="#aaa" stroke-width="1.5" fill="none"/>
  <line x1="196" y1="62" x2="196" y2="68" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 2: App buttons -->
  <rect x="38" y="96" width="52" height="30" rx="5" fill="#e50914"/>
  <text x="64" y="115" text-anchor="middle" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">NETFLIX</text>

  <rect x="96" y="96" width="44" height="30" rx="5" fill="#c4302b"/>
  <polygon points="112,105 112,119 124,112" fill="#fff"/>

  <rect x="146" y="96" width="44" height="30" rx="5" fill="#00a8e1"/>
  <text x="168" y="115" text-anchor="middle" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700">prime</text>

  <rect x="196" y="96" width="46" height="30" rx="5" fill="#1a3064"/>
  <text x="219" y="115" text-anchor="middle" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700">D+</text>

  <!-- D-Pad outer ring -->
  <circle cx="140" cy="200" r="74" fill="#2e2e2e"/>
  <circle cx="140" cy="200" r="73" fill="#2a2a2a" stroke="#363636" stroke-width="1"/>
  <!-- Direction arrows -->
  <polygon points="140,140 128,160 152,160" fill="#777"/>
  <polygon points="140,260 128,240 152,240" fill="#777"/>
  <polygon points="80,200 100,188 100,212" fill="#777"/>
  <polygon points="200,200 180,188 180,212" fill="#777"/>
  <!-- Center OK button -->
  <circle cx="140" cy="200" r="28" fill="#3a3a3a" stroke="#444" stroke-width="1"/>
  <text x="140" y="205" text-anchor="middle" fill="#ddd" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">OK</text>

  <!-- Row 4: Back / Home / Options -->
  <rect x="42" y="290" width="52" height="38" rx="9" fill="#333"/>
  <path d="M62 304 l-8 8 8 8" stroke="#aaa" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="114" y="290" width="52" height="38" rx="9" fill="#333"/>
  <path d="M133 316 l7-12 7 12z" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="134" y1="316" x2="146" y2="316" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="186" y="290" width="52" height="38" rx="9" fill="#333"/>
  <circle cx="204" cy="309" r="2.2" fill="#aaa"/>
  <circle cx="212" cy="309" r="2.2" fill="#aaa"/>
  <circle cx="220" cy="309" r="2.2" fill="#aaa"/>

  <!-- Row 5: Info / Text / Guide -->
  <rect x="42" y="342" width="52" height="34" rx="8" fill="#333"/>
  <circle cx="68" cy="356" r="7" stroke="#888" stroke-width="1.3" fill="none"/>
  <text x="68" y="360" text-anchor="middle" fill="#888" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700">i</text>

  <rect x="114" y="342" width="52" height="34" rx="8" fill="#333"/>
  <rect x="128" y="350" width="24" height="2.5" rx="1" fill="#888"/>
  <rect x="128" y="355" width="24" height="2.5" rx="1" fill="#888"/>
  <rect x="128" y="360" width="16" height="2.5" rx="1" fill="#888"/>

  <rect x="186" y="342" width="52" height="34" rx="8" fill="#333"/>
  <rect x="199" y="349" width="22" height="16" rx="2" stroke="#888" stroke-width="1.3" fill="none"/>
  <line x1="199" y1="355" x2="221" y2="355" stroke="#888" stroke-width="1"/>
  <line x1="210" y1="349" x2="210" y2="365" stroke="#888" stroke-width="1"/>

  <!-- VOL rocker -->
  <rect x="42" y="394" width="52" height="34" rx="10" fill="#333"/>
  <line x1="60" y1="411" x2="76" y2="411" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="403" x2="68" y2="419" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>
  <text x="68" y="443" text-anchor="middle" fill="#555" font-family="Arial,Helvetica,sans-serif" font-size="8" letter-spacing="1.5">VOL</text>
  <rect x="42" y="448" width="52" height="34" rx="10" fill="#333"/>
  <line x1="60" y1="465" x2="76" y2="465" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>

  <!-- Mute -->
  <circle cx="140" cy="430" r="22" fill="#333"/>
  <path d="M131 424 l5-5 v18 l-5-5z" fill="#aaa"/>
  <line x1="140" y1="421" x2="149" y2="439" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="149" y1="421" x2="140" y2="439" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>

  <!-- CH rocker -->
  <rect x="186" y="394" width="52" height="34" rx="10" fill="#333"/>
  <polygon points="212,403 203,418 221,418" fill="#aaa"/>
  <text x="212" y="443" text-anchor="middle" fill="#555" font-family="Arial,Helvetica,sans-serif" font-size="8" letter-spacing="1.5">CH</text>
  <rect x="186" y="448" width="52" height="34" rx="10" fill="#333"/>
  <polygon points="212,472 203,457 221,457" fill="#aaa"/>

  <!-- Color buttons -->
  <circle cx="80" cy="510" r="14" fill="#f44336"/>
  <circle cx="120" cy="510" r="14" fill="#4caf50"/>
  <circle cx="160" cy="510" r="14" fill="#ffeb3b"/>
  <circle cx="200" cy="510" r="14" fill="#2196f3"/>

  <!-- Media controls -->
  <rect x="38" y="542" width="48" height="34" rx="8" fill="#333"/>
  <polygon points="68,552 56,559 68,566" fill="#aaa"/>
  <polygon points="56,552 44,559 56,566" fill="#aaa"/>

  <rect x="93" y="542" width="48" height="34" rx="8" fill="#333"/>
  <polygon points="107,552 119,559 107,566" fill="#aaa"/>
  <polygon points="119,552 131,559 119,566" fill="#aaa"/>

  <rect x="148" y="542" width="48" height="34" rx="8" fill="#333"/>
  <polygon points="163,552 175,559 163,566" fill="#aaa"/>
  <rect x="177" y="552" width="3.5" height="14" rx="1" fill="#aaa"/>

  <rect x="203" y="542" width="48" height="34" rx="8" fill="#333"/>
  <rect x="220" y="552" width="14" height="14" rx="2" fill="#aaa"/>
</svg>
